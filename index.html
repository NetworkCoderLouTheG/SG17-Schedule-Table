<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Team Schedule Input</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: white;
            color: black;
        }
        .controls {
            margin: 0 0 20px 0;
            padding: 0;
        }
        .instructionText {
            font-size: 16px;
            margin: 0 0 20px 0;
            padding: 10px;
            background: #eee;
            border: 1px solid black;
        }
        .controls label {
            display: inline-block;
            width: 140px;
            font-weight: bold;
            margin: 0 0 5px 0;
        }
        .controls input[type="text"] {
            display: inline-block;
            padding: 5px;
            font-size: 16px;
            margin: 0 0 10px 0;
            border: 1px solid black;
            width: 200px;
        }
        .buttonGroup {
            margin: 10px 0 0 0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background: #eee;
            border: 1px solid black;
            cursor: pointer;
            margin: 0 10px 0 0;
        }
        button:hover {
            background: #ddd;
        }
        #statusMessage {
            display: block;
            margin: 10px 0 0 0;
            font-weight: bold;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            border: 1px solid black;
            margin: 20px 0 0 0;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }
        th {
            background: #eee;
            font-weight: bold;
        }
        .timeLabel {
            font-weight: bold;
            background: #eee;
            cursor: default;
            white-space: nowrap;
        }
        .selectedCell {
            background: #ccc;
        }
    </style>
</head>
<body>

<div class="controls">
    <div class="instructionText">
        <strong>Instructions:</strong> Please press the specific cells corresponding to the exact times you already have classes. Essentially mimic your current schedule exactly as it is shown in your MyMapua portal. Once finished, click the save button below the table.
    </div>

    <label for="firstNameInput">First Name:</label>
    <input type="text" id="firstNameInput" placeholder="e.g., John">
    <br>
    <label for="surnameInput">Surname:</label>
    <input type="text" id="surnameInput" placeholder="e.g., Doe">
    <br>
    <label for="studentNumberInput">Student Number:</label>
    <input type="text" id="studentNumberInput" placeholder="e.g., S123456">
    <br>
    
    <div class="buttonGroup">
        <button id="loadButton">Load My Schedule</button>
    </div>
    <span id="statusMessage"></span>
</div>

<table id="scheduleTable">
    <thead>
        <tr id="headerRow">
            <th>Schedule</th>
        </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
</table>

<div class="buttonGroup">
    <button id="saveButton">Save My Schedule</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAupSRY6wNLrdxloEK-u6P__8b0QVspwik",
        authDomain: "sg17-table-schedule.firebaseapp.com",
        projectId: "sg17-table-schedule",
        storageBucket: "sg17-table-schedule.firebasestorage.app",
        messagingSenderId: "1009267087171",
        appId: "1:1009267087171:web:83589ebc488d7ed48f01f6"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const times = [
        '07:00AM to 08:10AM',
        '08:10AM to 09:20AM',
        '09:20AM to 10:30AM',
        '10:30AM to 11:40AM',
        '11:40AM to 12:50PM',
        '12:50PM to 02:00PM',
        '02:00PM to 03:10PM',
        '03:10PM to 04:20PM',
        '04:20PM to 05:30PM',
        '05:30PM to 06:40PM',
        '06:40PM to 07:50PM',
        '07:50PM to 09:00PM'
    ];
    
    let localSelections = new Set();

    function initializeTable() {
        const headerRow = document.getElementById('headerRow');
        for (let i = 0; i < days.length; i++) {
            const th = document.createElement('th');
            th.textContent = days[i];
            headerRow.appendChild(th);
        }

        const tableBody = document.getElementById('tableBody');
        for (let i = 0; i < times.length; i++) {
            const timeLabelString = times[i];
            const tr = document.createElement('tr');
            
            const timeCell = document.createElement('td');
            timeCell.className = 'timeLabel';
            timeCell.textContent = timeLabelString;
            tr.appendChild(timeCell);

            for (let j = 0; j < days.length; j++) {
                const day = days[j];
                const td = document.createElement('td');
                const sanitizedTime = timeLabelString.replace(/[: ]/g, '');
                const cellId = day + '_' + sanitizedTime;
                td.id = cellId;
                
                td.onclick = function() { toggleLocalSelection(td, cellId); };
                tr.appendChild(td);
            }
            tableBody.appendChild(tr);
        }
    }

    function toggleLocalSelection(cellElement, cellId) {
        if (localSelections.has(cellId)) {
            localSelections.delete(cellId);
            cellElement.classList.remove('selectedCell');
        } else {
            localSelections.add(cellId);
            cellElement.classList.add('selectedCell');
        }
    }

    document.getElementById('loadButton').onclick = async function() {
        const studentNumber = document.getElementById('studentNumberInput').value.trim();
        const statusMessage = document.getElementById('statusMessage');

        if (studentNumber === '') {
            statusMessage.textContent = 'Please enter your student number to load your schedule.';
            statusMessage.style.color = 'red';
            return;
        }

        statusMessage.textContent = 'Loading your classes from the database...';
        statusMessage.style.color = 'blue';

        try {
            const docRef = doc(db, "team_schedules", studentNumber);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('firstNameInput').value = data.firstName || '';
                document.getElementById('surnameInput').value = data.surname || '';

                localSelections.forEach(cellId => {
                    const cellElement = document.getElementById(cellId);
                    if (cellElement) cellElement.classList.remove('selectedCell');
                });
                localSelections.clear();

                const savedSlots = data.busySlots || [];
                savedSlots.forEach(cellId => {
                    localSelections.add(cellId);
                    const cellElement = document.getElementById(cellId);
                    if (cellElement) cellElement.classList.add('selectedCell');
                });

                statusMessage.textContent = 'Schedule loaded successfully! You can make changes and save again.';
                statusMessage.style.color = 'green';
            } else {
                statusMessage.textContent = 'No schedule was found for this student number.';
                statusMessage.style.color = 'red';
            }
        } catch (error) {
            console.error(error);
            statusMessage.textContent = 'An error occurred while loading your data.';
            statusMessage.style.color = 'red';
        }
    };

    document.getElementById('saveButton').onclick = async function() {
        const firstName = document.getElementById('firstNameInput').value.trim();
        const surname = document.getElementById('surnameInput').value.trim();
        const studentNumber = document.getElementById('studentNumberInput').value.trim();
        const statusMessage = document.getElementById('statusMessage');

        if (firstName === '' || surname === '' || studentNumber === '') {
            statusMessage.textContent = 'Please completely fill in your first name, surname, and student number.';
            statusMessage.style.color = 'red';
            return;
        }

        statusMessage.textContent = 'Saving your schedule to the server...';
        statusMessage.style.color = 'blue';

        const userData = {
            firstName: firstName,
            surname: surname,
            studentNumber: studentNumber,
            busySlots: Array.from(localSelections)
        };

        try {
            const docRef = doc(db, "team_schedules", studentNumber);
            await setDoc(docRef, userData);
            statusMessage.textContent = 'Success! Your schedule has been securely saved.';
            statusMessage.style.color = 'green';
        } catch (error) {
            console.error(error);
            statusMessage.textContent = 'An error occurred while saving. Please try again.';
            statusMessage.style.color = 'red';
        }
    };

    initializeTable();
</script>
</body>
</html>
